<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Northstar News</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f6f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d9e1ec;
      --accent: #0a84ff;
      --accent-soft: #e8f2ff;
      --hot: #d9480f;
      --green: #0f8f5f;
      --shadow: 0 14px 34px rgba(17, 24, 39, 0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f141c;
        --panel: #171f2a;
        --text: #f7f9fc;
        --muted: #a7b0be;
        --line: #2f3a4a;
        --accent: #4aa3ff;
        --accent-soft: #13263f;
        --hot: #ff9b63;
        --green: #32d583;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 13px 16px 11px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .mark {
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      width: 33px;
      height: 33px;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(135deg, #0a84ff, #ff70a6);
      font-weight: 900;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
      font-weight: 750;
    }

    .live::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    nav {
      display: flex;
      gap: 6px;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 0 16px 11px;
      overflow-x: auto;
    }

    nav span {
      flex: 0 0 auto;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
      font-weight: 750;
    }

    nav span:first-child {
      color: #fff;
      border-color: transparent;
      background: var(--accent);
    }

    main {
      width: min(980px, calc(100vw - 22px));
      margin: 12px auto 28px;
    }

    .lead-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero-art {
      min-height: 154px;
      background:
        linear-gradient(135deg, rgba(10, 132, 255, 0.86), rgba(255, 112, 166, 0.72)),
        radial-gradient(circle at 72% 12%, rgba(255, 255, 255, 0.35), transparent 28%);
      position: relative;
    }

    .hero-art::after {
      content: "";
      position: absolute;
      right: 22px;
      bottom: 18px;
      width: 104px;
      height: 72px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 14px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.10)),
        repeating-linear-gradient(0deg, transparent 0 12px, rgba(255, 255, 255, 0.22) 12px 13px);
    }

    .lead-copy {
      padding: 16px;
    }

    .kicker {
      margin: 0 0 7px;
      color: var(--hot);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .feed {
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .feed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
    }

    .feed-head b {
      font-size: 15px;
    }

    .page-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .story {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      padding: 13px 15px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .story:first-child {
      border-top: 0;
    }

    .story.is-new {
      background: color-mix(in srgb, var(--accent-soft) 78%, var(--panel));
      animation: slide-in 0.42s ease both;
    }

    @keyframes slide-in {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .rank {
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .title {
      overflow: hidden;
      color: var(--text);
      font-size: 16px;
      font-weight: 820;
      line-height: 1.22;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .meta .hot {
      color: var(--hot);
      font-weight: 850;
    }

    .more-wrap {
      padding: 14px;
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 82%, var(--bg));
    }

    .more-button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(10, 132, 255, 0.24);
    }

    .more-button:disabled {
      cursor: default;
      opacity: 0.78;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 4;
      transform: translateX(-50%) translateY(16px);
      width: min(390px, calc(100vw - 34px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      opacity: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      main {
        display: grid;
        grid-template-columns: minmax(320px, 0.85fr) minmax(0, 1.15fr);
        gap: 14px;
      }

      .feed {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand"><span class="mark">N</span><span>Northstar News</span></div>
      <div class="live" id="liveText">Updated just now</div>
    </div>
    <nav aria-label="Sections">
      <span>Top</span>
      <span>Launches</span>
      <span>Design</span>
      <span>AI</span>
      <span>Markets</span>
      <span>Tools</span>
    </nav>
  </header>

  <main>
    <article class="lead-card">
      <div class="hero-art" aria-hidden="true"></div>
      <div class="lead-copy">
        <p class="kicker">Live coverage</p>
        <h1 id="headline">Independent builders are shipping faster on mobile.</h1>
        <p class="lead" id="summary">A rolling digest of launches, tools, and small product updates from the past hour.</p>
      </div>
    </article>

    <section class="feed" aria-label="Latest stories">
      <div class="feed-head">
        <b>Latest stories</b>
        <span class="page-count" id="pageCount">Page 1 of 3</span>
      </div>
      <div id="storyList"></div>
      <div class="more-wrap">
        <button class="more-button" id="moreButton" type="button">More</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">More stories loaded</div>

  <script>
    const pages = [
      {
        count: "Page 1 of 30",
        live: "Updated just now",
        headline: "Independent builders are shipping faster on mobile.",
        summary: "A rolling digest of launches, product news, and industry updates from the past hour.",
        stories: [
          ["A compact editor for quick launch notes", "18 points", "4 comments"],
          ["How a small team handles a midnight release", "31 points", "12 comments"],
          ["A new dashboard tracks waitlists in real time", "27 points", "8 comments"],
          ["Design details that made a tiny app feel faster", "22 points", "6 comments"],
          ["Developers test a leaner checkout flow", "19 points", "3 comments"],
          ["A field report from a product demo day", "15 points", "2 comments"]
        ]
      },
      {
        count: "Page 2 of 30",
        live: "Updated 5 sec ago",
        headline: "New launches are moving from waitlist to public release.",
        summary: "Fresh updates are now available from the next page of the live feed.",
        stories: [
          ["A chip startup announces its first developer kit", "86 points", "24 comments"],
          ["A calendar app adds shared booking pages", "74 points", "19 comments"],
          ["A startup posts new pricing experiments", "61 points", "14 comments"],
          ["Open-source database project adds vector search", "58 points", "11 comments"],
          ["Designers share a cleaner mobile settings panel", "43 points", "9 comments"],
          ["Small apps are winning with clearer onboarding", "39 points", "7 comments"]
        ]
      },
      {
        count: "Page 3 of 30",
        live: "Updated 10 sec ago",
        headline: "The final batch adds follow-up analysis and reader notes.",
        summary: "The feed has reached the latest set of stories for this session.",
        stories: [
          ["Reader notes from today’s launch coverage", "97 points", "31 comments"],
          ["What changed after the latest product release", "88 points", "22 comments"],
          ["Teams compare notes from a live demo day", "76 points", "17 comments"],
          ["A practical guide to public status pages", "64 points", "13 comments"],
          ["Fresh API examples arrive in developer docs", "52 points", "10 comments"],
          ["Weekend projects that shipped before noon", "49 points", "8 comments"]
        ]
      }
    ];

    let pageIndex = 0;
    const storyList = document.getElementById("storyList");
    const moreButton = document.getElementById("moreButton");
    const pageCount = document.getElementById("pageCount");
    const liveText = document.getElementById("liveText");
    const headline = document.getElementById("headline");
    const summary = document.getElementById("summary");
    const toast = document.getElementById("toast");

    function renderPage(isNew) {
      const page = pages[pageIndex];
      pageCount.textContent = page.count;
      liveText.textContent = page.live;
      headline.textContent = page.headline;
      summary.textContent = page.summary;
      storyList.innerHTML = page.stories.map((story, index) => `
        <article class="story${isNew ? " is-new" : ""}" style="animation-delay:${index * 42}ms">
          <div class="rank">${pageIndex * 6 + index + 1}</div>
          <div>
            <div class="title">${story[0]}</div>
            <div class="meta"><span class="hot">${story[1]}</span><span>${story[2]}</span></div>
          </div>
        </article>
      `).join("");
      moreButton.textContent = pageIndex >= pages.length - 1 ? "All caught up" : "More";
      moreButton.disabled = pageIndex >= pages.length - 1;
    }

    function showToast() {
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1700);
    }

    moreButton.addEventListener("click", () => {
      if (pageIndex >= pages.length - 1) return;
      pageIndex += 1;
      renderPage(true);
      showToast();
    });

    renderPage(false);
  </script>
</body>
</html>
